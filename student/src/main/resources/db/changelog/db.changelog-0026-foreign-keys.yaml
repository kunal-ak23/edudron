databaseChangeLog:
  - changeSet:
      id: student-0026-project-foreign-keys
      author: edudron
      changes:
        - addForeignKeyConstraint:
            baseTableSchemaName: student
            baseTableName: project_group
            baseColumnNames: project_id
            referencedTableSchemaName: student
            referencedTableName: project
            referencedColumnNames: id
            constraintName: fk_project_group_project
            onDelete: CASCADE
