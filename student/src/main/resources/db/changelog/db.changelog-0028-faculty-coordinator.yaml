databaseChangeLog:
  - changeSet:
      id: 0028-add-coordinator-to-classes
      author: edudron
      changes:
        - addColumn:
            tableName: classes
            schemaName: student
            columns:
              - column:
                  name: coordinator_user_id
                  type: varchar(255)
                  constraints:
                    nullable: true

  - changeSet:
      id: 0028-add-coordinator-to-batches
      author: edudron
      changes:
        - addColumn:
            tableName: batches
            schemaName: student
            columns:
              - column:
                  name: coordinator_user_id
                  type: varchar(255)
                  constraints:
                    nullable: true
