spring:
  application:
    name: core-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:edudron}?sslmode=${DB_SSLMODE:prefer}
    username: ${DB_USERNAME:edudron}
    password: ${DB_PASSWORD:edudron}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:50}
      minimum-idle: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
      leak-detection-threshold: 60000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
      repositories:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc.time_zone: UTC
        # NO default_schema — entities use @Table(schema=...)

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans,configprops
  endpoint:
    health:
      show-details: always
      show-components: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  show-actuator: true

server:
  port: ${CORE_API_SERVICE_PORT:8085}
  connection-timeout: 600000
  servlet:
    session:
      timeout: 600s
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      file-size-threshold: 1MB

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:mySecretKey123456789012345678901234567890}
  expiration: ${JWT_EXPIRATION:86400}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800}

# Azure Storage Configuration (proctoring photos)
azure:
  storage:
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING:}
    account-name: ${AZURE_STORAGE_ACCOUNT_NAME:}
    proctoring-container-name: ${AZURE_STORAGE_PROCTORING_CONTAINER:proctoring-photos}
    photo-retention-days: ${AZURE_STORAGE_PHOTO_RETENTION_DAYS:90}
